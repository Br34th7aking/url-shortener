services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: urlshort
      POSTGRES_USER: urlshort
      POSTGRES_PASSWORD: urlshort
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urlshort"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: ./backend
    # Dev command: apply migrations, then the autoreloading dev server.
    # (The image's default CMD is gunicorn for production.)
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: dev-compose-not-a-real-secret
      DJANGO_DEBUG: "True"
      # "web" lets the frontend container's Vite proxy (changeOrigin) reach Django.
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,web
      DATABASE_URL: postgres://urlshort:urlshort@db:5432/urlshort
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    # Dev server with HMR. node_modules lives in a named volume (not the host
    # mount) so the container installs its own Linux-native binaries.
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      # vite.config reads this to proxy /api to the Django service on the network.
      VITE_API_PROXY: http://web:8000
    depends_on:
      - web

volumes:
  pgdata:
  frontend_node_modules:
